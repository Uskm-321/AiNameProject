<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>用户管理</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f4f6f8; color: #172033; }
    .page { max-width: 1380px; margin: 0 auto; padding: 24px; }
    .bar, .panel, .stat { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; }
    .bar { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 18px; margin-bottom: 18px; }
    .title { font-size: 24px; font-weight: 700; }.subtitle { margin-top: 5px; color: #667085; font-size: 14px; }
    button { padding: 8px 12px; border: 1px solid #d0d5dd; border-radius: 6px; background: #fff; cursor: pointer; }
    button:disabled { opacity: .45; cursor: default; }.primary { color: #fff; background: #165dff; border-color: #165dff; }
    .warn { color: #b54708; border-color: #fedf89; }.success { color: #067647; border-color: #abefc6; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 18px; }
    .stat { padding: 18px; }.stat-label { color: #667085; font-size: 14px; }.stat-value { margin-top: 8px; font-size: 28px; font-weight: 700; }
    .panel { padding: 18px; }.toolbar, .pager, .actions { display: flex; align-items: center; gap: 10px; }
    .toolbar { margin-bottom: 16px; }.search { flex: 1; min-width: 220px; padding: 10px 12px; border: 1px solid #d0d5dd; border-radius: 6px; }
    .status { min-height: 22px; margin-bottom: 10px; color: #d92d20; }.table-wrap { overflow-x: auto; }
    table { width: 100%; min-width: 1020px; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 12px 10px; border-bottom: 1px solid #eaecf0; text-align: left; white-space: nowrap; }
    th { color: #667085; background: #f9fafb; }.name { color: #175cd3; font-weight: 600; cursor: pointer; }
    .badge { display: inline-block; padding: 4px 9px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .normal { color: #067647; background: #ecfdf3; }.banned { color: #b42318; background: #fef3f2; }.disabled { color: #475467; background: #f2f4f7; }
    select { padding: 7px; border: 1px solid #d0d5dd; border-radius: 6px; background: #fff; }
    .pager { justify-content: flex-end; margin-top: 16px; color: #667085; }.empty { padding: 28px; text-align: center; color: #98a2b3; }
    .mask { position: fixed; inset: 0; z-index: 10; display: none; align-items: center; justify-content: center; padding: 20px; background: rgba(16,24,40,.55); }
    .mask.show { display: flex; }.modal { width: min(900px, 100%); max-height: 86vh; overflow-y: auto; padding: 20px; border-radius: 8px; background: #fff; }
    .modal-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .detail-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
    .detail { padding: 12px; border: 1px solid #eaecf0; border-radius: 6px; }.detail b { display: block; color: #667085; margin-bottom: 6px; font-size: 12px; }
    .key { font-family: Consolas, Monaco, monospace; }.section-title { margin: 16px 0 8px; font-weight: 700; }
    @media(max-width:720px){.stats{grid-template-columns:1fr}.detail-grid{grid-template-columns:repeat(2,1fr)}.page{padding:14px}}
  </style>
</head>
<body>
  <main class="page">
    <section class="bar">
      <div><div class="title">用户管理</div><div class="subtitle" id="account">管理员</div></div>
      <button onclick="location.href='/page/admin'">返回工作台</button>
    </section>
    <section class="stats">
      <div class="stat"><div class="stat-label">总用户数</div><div class="stat-value" id="totalUsers">0</div></div>
      <div class="stat"><div class="stat-label">今日活跃用户</div><div class="stat-value" id="activeUsers">0</div></div>
      <div class="stat"><div class="stat-label">总调用量</div><div class="stat-value" id="totalUsage">0</div></div>
    </section>
    <section class="panel">
      <div class="toolbar"><input class="search" id="keyword" placeholder="搜索用户名或邮箱"><button class="primary" id="searchBtn">搜索</button></div>
      <div class="status" id="status"></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>用户名</th><th>邮箱</th><th>角色</th><th>注册时间</th><th>状态</th><th>今日调用量</th><th>操作</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
        <div class="empty" id="empty">暂无用户</div>
      </div>
      <div class="pager"><button id="prevBtn">上一页</button><span id="pageInfo">第 1 / 1 页</span><button id="nextBtn">下一页</button></div>
    </section>
  </main>
  <div class="mask" id="detailMask" onclick="if(event.target===this)closeDetail()">
    <div class="modal">
      <div class="modal-head"><div><div class="title" id="detailName"></div><div class="subtitle" id="detailEmail"></div></div><button onclick="closeDetail()">关闭</button></div>
      <div class="detail-grid" id="detailGrid"></div>
      <div class="section-title">API Key</div>
      <div class="table-wrap"><table><thead><tr><th>名称</th><th>Key</th><th>状态</th><th>今日用量</th><th>历史用量</th></tr></thead><tbody id="keyRows"></tbody></table></div>
    </div>
  </div>
  <script>
    const token = localStorage.getItem("token");
    const currentUser = JSON.parse(localStorage.getItem("user") || "{}");
    const adminRoles = ["admin","super_admin","ADMIN","SUPER_ADMIN"];
    const superRoles = ["super_admin","SUPER_ADMIN"];
    let page = 1, total = 0;
    const pageSize = 20;
    const byId = id => document.getElementById(id);
    byId("account").textContent = `${currentUser.email || "管理员"} · ${currentUser.role || ""}`;
    if (!adminRoles.includes(currentUser.role)) location.href = "/page/index";

    async function api(url, options={}) {
      const response = await fetch(url, { ...options, headers: { authorization:`Bearer ${token}`, ...(options.body?{"content-type":"application/json"}:{}), ...(options.headers||{}) } });
      const data = await response.json().catch(()=>({}));
      if (!response.ok) {
        const detail = Array.isArray(data.detail) ? data.detail[0]?.msg : data.detail;
        throw new Error(typeof detail === "string" ? detail : `请求失败 (${response.status})`);
      }
      return data;
    }
    const role = value => String(value||"").toLowerCase();
    const canManage = user => user.id !== currentUser.id && role(user.role) !== "super_admin" && (superRoles.includes(currentUser.role) || role(user.role) === "user");
    const canRole = user => superRoles.includes(currentUser.role) && user.id !== currentUser.id && role(user.role) !== "super_admin";
    const formatTime = value => value ? new Date(value).toLocaleString("zh-CN",{hour12:false}) : "-";
    const esc = value => { const node=document.createElement("div");node.textContent=value==null?"":String(value);return node.innerHTML; };

    async function load() {
      byId("status").textContent = "";
      try {
        const keyword = byId("keyword").value.trim();
        const result = await api(`/admin/users?page=${page}&page_size=${pageSize}&keyword=${encodeURIComponent(keyword)}`);
        total=result.total||0;const pages=Math.max(1,Math.ceil(total/pageSize));
        byId("totalUsers").textContent=total;
        byId("pageInfo").textContent=`第 ${page} / ${pages} 页，共 ${total} 人`;byId("prevBtn").disabled=page<=1;byId("nextBtn").disabled=page>=pages;
        byId("empty").style.display=result.items.length?"none":"block";
        byId("rows").innerHTML=result.items.map(user=>`<tr>
          <td>${user.id}</td><td class="name" onclick="showDetail(${user.id})">${esc(user.username)}</td><td>${esc(user.email)}</td>
          <td>${canRole(user)?`<select onchange="changeRole(${user.id},this.value)"><option value="USER" ${role(user.role)==="user"?"selected":""}>user</option><option value="ADMIN" ${role(user.role)==="admin"?"selected":""}>admin</option></select>`:esc(role(user.role))}</td>
          <td>${formatTime(user.created_at)}</td><td><span class="badge ${user.status==="ACTIVE"?"normal":"banned"}">${user.status==="ACTIVE"?"正常":"封禁"}</span></td>
          <td>${user.today_usage||0}</td><td><div class="actions">${canManage(user)?`<button class="${user.status==="ACTIVE"?"warn":"success"}" onclick="${user.status==="ACTIVE"?"ban":"unban"}User(${user.id},'${esc(user.username)}')">${user.status==="ACTIVE"?"封禁":"解封"}</button>`:"-"}</div></td>
        </tr>`).join("");
        try {
          const overview = await api("/admin/users/overview");
          byId("totalUsers").textContent=overview.total_users;
          byId("activeUsers").textContent=overview.active_users_today;
          byId("totalUsage").textContent=overview.total_usage;
        } catch (overviewError) {
          byId("activeUsers").textContent="—";
          byId("totalUsage").textContent="—";
          byId("status").textContent="用户列表已加载；统计接口需要重启后端后生效。";
        }
      } catch(error) { byId("status").textContent = `${error.message}。如刚更新代码，请重启后端。`; }
    }
    async function showDetail(id) {
      try {
        const data=await api(`/admin/users/${id}/detail`);const user=data.user;
        byId("detailName").textContent=user.username;byId("detailEmail").textContent=`${user.email} · ID ${user.id}`;
        byId("detailGrid").innerHTML=`<div class="detail"><b>角色</b>${role(user.role)}</div><div class="detail"><b>状态</b>${user.status==="ACTIVE"?"正常":"封禁"}</div><div class="detail"><b>注册时间</b>${formatTime(user.created_at)}</div><div class="detail"><b>今日调用</b>${user.today_usage||0}</div>`;
        byId("keyRows").innerHTML=data.api_keys.length?data.api_keys.map(key=>`<tr><td>${esc(key.name)}</td><td class="key">${esc(key.key_masked)}</td><td><span class="badge ${key.status==="active"?"normal":"disabled"}">${key.status==="active"?"激活":"禁用"}</span></td><td>${key.used_today}/${key.total_quota}</td><td>${key.total_used}</td></tr>`).join(""):`<tr><td colspan="5" class="empty">暂无 API Key</td></tr>`;
        byId("detailMask").classList.add("show");
      } catch(error){alert(error.message);}
    }
    function closeDetail(){byId("detailMask").classList.remove("show");}
    async function banUser(id,name){const reason=prompt(`请输入封禁 ${name} 的理由`,"管理员封禁");if(reason===null)return;try{await api(`/admin/users/${id}/ban`,{method:"POST",body:JSON.stringify({reason,banned_until:null})});load();}catch(error){alert(error.message);}}
    async function unbanUser(id){try{await api(`/admin/users/${id}/unban`,{method:"POST"});load();}catch(error){alert(error.message);}}
    async function changeRole(id,value){try{await api(`/admin/users/${id}/role`,{method:"PATCH",body:JSON.stringify({role:value})});load();}catch(error){alert(error.message);load();}}
    byId("searchBtn").onclick=()=>{page=1;load();};byId("keyword").onkeydown=e=>{if(e.key==="Enter"){page=1;load();}};
    byId("prevBtn").onclick=()=>{if(page>1){page--;load();}};byId("nextBtn").onclick=()=>{if(page<Math.max(1,Math.ceil(total/pageSize))){page++;load();}};
    load();
  </script>
</body>
</html>
